<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Scheduler Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div class="app-layout">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="icon-button">
                    <!-- Ícone de colapsar menu -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="sidebar-title-group">
                    <h2>Processos</h2>
                    <p>Adicione aqui os processos a serem colocados para execução</p>
                </div>

                <div class="sidebar-actions">
                    <button id="btn-toggle-form" class="btn-dark">Novo Processo</button>
                    <button id="clear-processes" class="btn-text">Limpar</button>
                </div>

                <div class="new-process-card" id="form-container">
                    <div class="card-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                        <h3>Novo Processo</h3>
						<button id="btn-delete"></button>
                    </div>
                    
                    <form id="process-form">    

                        <div class="input-group">
                            <label for="pid">Identificador</label>
                            <input type="number" id="pid" placeholder="PID" value="1" required>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="arrivalTime">Entrada</label>
                                <input type="number" id="arrivalTime" placeholder="min" value="0" required>
                            </div>
                            <div class="input-group">
                                <label for="burstTime">Tempo</label>
                                <input type="number" id="burstTime" placeholder="min" value="5" required>
                            </div>
                        </div>

                        <div class="input-group" id="priority-group" style="display:none;">
                            <div class="label-row">
                                <label for="priority">Prioridade</label>
                                <span>0-100</span>
                            </div>
                            <input type="range" id="priority" min="0" max="100" value="10">
                            <span id="priority-val" class="range-val">10</span>
                        </div>

                        <div class="input-group toggle-group" id="deadline-toggle-group" style="display:none;">
                            <div>
                                <label>Adicionar Deadline</label>
                                <p class="help-text">Afeta algoritmos que usam deadline</p>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="check-deadline">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="input-group" id="deadline-group" style="display:none;">
                            <label>Deadline</label>
                            <input type="number" placeholder="min" disabled class="disabled-input" id="input_deadline">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-dark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Adicionar</button>
                            <button type="button" class="btn-text" id="btn-cancel-form"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> Cancelar</button>
                        </div>
                    </form>
                </div>

                <ul id="process-list" class="process-list"></ul>
            </div>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-section">
                    <label>Algoritmo</label>
                    <select id="algorithm-select" class="custom-select">
                        <option value="FIFO">FIFO (First-In, First-Out)</option>
                        <option value="SJF">SJF (Shortest Job First)</option>
                        <option value="SRTF">SRTF (Shortest Remaining Time First)</option>
                        <option value="RR">RR (Round Robin)</option>
                        <option value="EDF">EDF (Earliest Deadline First)</option>
                        <option value="HPF">HPF (Highest Priority First)</option>
                        <option value="CFSS">CFS-Sim (Completely Fair Scheduler)</option>
                        <option value="FPET">FPET (Fixed Permutation Earliness/Tardiness)</option>
                        <option value="MHPET">MHPET (Meta-Heuristic Permutational Earliness/Tardiness)</option>
                    </select>
                </div>

                <div class="player-controls">
					<button id="btn-rewind" class="icon-btn-round" title="Retroceder">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
					</button>
					
					<button id="btn-pause" class="icon-btn-round" title="Pausar">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
					</button>
					
					<button id="run-simulation" class="icon-btn-round play-btn" title="Play">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
					</button>
					
					<button id="btn-forward" class="icon-btn-round" title="Avançar">
						<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
					</button>
				</div>

                <div class="topbar-section speed-section">
					<div class="label-row">
						<label>Velocidade: <span id="speed-val">5</span></label>
						<span>0-10</span>
					</div>
					<input type="range" id="speed-input" min="0" max="10" value="5">
				</div>

                <div class="topbar-section context-section" id="switching-group" style="display:none;">
                    <div class="label-row toggle-row">
                        <label>Troca de Contexto</label>
                        <label class="switch">
                            <input type="checkbox" id="switching-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <input type="number" placeholder="Switching time" class="switching-time-input" id="switching-time-input" disabled>
                </div>

                <div class="topbar-section" id="decay-group" style="display:none;">
                    <label id="decay-label">Quantum</label>
                    <input type="number" placeholder="Quantum" id="decay-input" max="0.999">
                </div>

                <div class="topbar-section" id="temperature-group" style="display:none;">
                    <label>Temperature</label>
                    <input type="number" placeholder="Temperature" id="temperature-input">
                </div>

                <div class="topbar-section" id="seed-group" style="display:none;">
                    <label>Seed</label>
                    <input type="number" placeholder="Seed" id="seed-input" value="0">
                </div>
            </header>

            <div class="workspace-grid">
                <section class="panel gantt-panel">
                    <h2>Gráfico de Execução</h2>
                    <div class="panel-content">
                        <div id="gantt-chart"></div>
                    </div>
                </section>

                <section class="panel top-right-panel">
                    <h2>Fluxo do Processador</h2>
                    <div class="panel-content">
                        <div id="statistics">Aguardando execução...</div>
                    </div>
                </section>

                <section class="panel bottom-right-panel">
                    <h2>Memória RAM</h2>
                    <div class="panel-content">
                        <p>Nova feature em breve</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script type="text/javascript" src="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <script type="module" src="./wasm/module.js"></script>
    <script src="./js/ui.js" type="module"></script>
</body>
</html>
